<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vamos Jogar?</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap');

        body {
            background-color: #050208;
            margin: 0;
            font-family: 'Poppins', system-ui, -apple-system, sans-serif;
            -webkit-tap-highlight-color: transparent;
            min-height: 100dvh;
        }

        @keyframes pulse-glow {
            0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.8; }
            50% { transform: translate(-50%, -50%) scale(1.15); opacity: 1; }
        }
        .ambient-light-1 { animation: pulse-glow 8s ease-in-out infinite; }
        .ambient-light-2 { animation: pulse-glow 12s ease-in-out infinite reverse; }

        .game-card {
            transition: transform 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275), border-color 0.25s, box-shadow 0.25s;
        }
        .game-card:hover { transform: translateY(-4px); border-color: #a874e4; }
        .game-card:active { transform: translateY(0px); }
    </style>
</head>
<body class="text-white relative flex flex-col">

    <div class="fixed inset-0 pointer-events-none z-0 overflow-hidden">
        <div class="ambient-light-1 absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[90vw] h-[90vw] max-w-[800px] max-h-[800px] bg-purple-900/20 blur-[120px] rounded-full"></div>
        <div class="ambient-light-2 absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[60vw] h-[60vw] max-w-[500px] max-h-[500px] bg-pink-600/10 blur-[100px] rounded-full"></div>
    </div>

    <!-- Cabeçalho -->
    <div class="relative z-20 w-full p-4 md:px-6 md:py-5 flex justify-between items-center max-w-4xl mx-auto shrink-0">
        <div>
            <h1 class="text-xl md:text-3xl font-black tracking-tight text-white leading-none">
                Vamos Jogar?
            </h1>
            <p class="text-[10px] md:text-sm text-[#dcc3f5] font-medium mt-1">Escolha um joguinho para curtir juntos.</p>
        </div>

        <button onclick="goBack()" class="bg-white hover:bg-[#f8f5ff] active:translate-y-1 active:shadow-none p-2.5 rounded-full transition-all border-2 border-[#dcc3f5] shadow-[0_4px_0_0_#dcc3f5] text-[#a874e4]" aria-label="Voltar">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" class="w-4 h-4"><path d="M18 6 6 18"></path><path d="m6 6 12 12"></path></svg>
        </button>
    </div>

    <!-- Cards dos Jogos -->
    <div class="relative z-20 flex-grow flex items-center justify-center p-4 md:p-6 w-full">
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-5 w-full max-w-2xl mx-auto">

            <a href="jogo_da_memoria.html" class="game-card bg-white/5 border-2 border-white/10 rounded-[28px] p-6 flex flex-col items-center text-center backdrop-blur-md shadow-[0_4px_0_0_rgba(255,255,255,0.05)]">
                <div class="w-16 h-16 rounded-2xl bg-gradient-to-br from-[#a874e4] to-[#cba4f1] flex items-center justify-center mb-4 shadow-[0_4px_15px_rgba(168,85,247,0.4)]">
                    <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1"></rect><rect x="14" y="3" width="7" height="7" rx="1"></rect><rect x="3" y="14" width="7" height="7" rx="1"></rect><rect x="14" y="14" width="7" height="7" rx="1"></rect></svg>
                </div>
                <h2 class="font-black text-lg text-white mb-1.5">Jogo da Memória</h2>
                <p class="text-[#b4b4c4] text-[12.5px] font-medium leading-relaxed mb-5">Encontre os pares com as fotos de vocês.</p>
                <span class="mt-auto w-full bg-[#a874e4] text-white font-bold text-[14px] py-3 rounded-[16px] shadow-[0_4px_0_0_#8b5bc4] group-active:translate-y-1">Jogar</span>
            </a>

            <a href="palavra_secreta.html" class="game-card bg-white/5 border-2 border-white/10 rounded-[28px] p-6 flex flex-col items-center text-center backdrop-blur-md shadow-[0_4px_0_0_rgba(255,255,255,0.05)]">
                <div class="w-16 h-16 rounded-2xl bg-gradient-to-br from-[#a874e4] to-[#cba4f1] flex items-center justify-center mb-4 shadow-[0_4px_15px_rgba(168,85,247,0.4)]">
                    <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 7V4h16v3"></path><path d="M9 20h6"></path><path d="M12 4v16"></path></svg>
                </div>
                <h2 class="font-black text-lg text-white mb-1.5">Palavra Secreta</h2>
                <p class="text-[#b4b4c4] text-[12.5px] font-medium leading-relaxed mb-5">Descubra a palavra escondida em 6 tentativas.</p>
                <span class="mt-auto w-full bg-[#a874e4] text-white font-bold text-[14px] py-3 rounded-[16px] shadow-[0_4px_0_0_#8b5bc4]">Jogar</span>
            </a>

        </div>
    </div>

    <!-- Rodapé -->
    <div class="relative z-20 w-full flex justify-center pb-6 pt-1 shrink-0">
        <a href="index.html" class="text-[10px] md:text-[11px] font-semibold text-[#b4b4c4] bg-black/40 px-4 py-1.5 rounded-full backdrop-blur-md border border-white/10 hover:text-white transition-colors">
            Criado com <span class="text-[#a874e4] font-bold">Lontra</span>
        </a>
    </div>

    <script>
        function goBack() {
            if (window.history.length > 1) {
                window.history.back();
            } else {
                window.location.href = 'demo.html';
            }
        }
    </script>
</body>
</html>
