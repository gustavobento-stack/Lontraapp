<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jogo da Memória</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap');

        body {
            background-color: #050208;
            margin: 0;
            overflow: hidden; /* Remove o scroll de toda a página */
            font-family: 'Poppins', system-ui, -apple-system, sans-serif;
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        @keyframes pulse-glow {
            0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.8; }
            50% { transform: translate(-50%, -50%) scale(1.15); opacity: 1; }
        }
        .ambient-light-1 { animation: pulse-glow 8s ease-in-out infinite; }
        .ambient-light-2 { animation: pulse-glow 12s ease-in-out infinite reverse; }

        .scene {
            perspective: 1000px;
            cursor: pointer;
            width: 100%;
            height: 100%;
        }

        .card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            transition: transform 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            transform-style: preserve-3d;
        }

        .scene.flipped .card-inner {
            transform: rotateY(180deg);
        }

        /* Nova Animação Suave ao Encontrar o Par (Com Giro 360) */
        @keyframes match-anim {
            0% { transform: rotateY(180deg) scale(1); }
            15% { 
                transform: rotateY(180deg) scale(1.15); 
                box-shadow: 0 0 30px rgba(244, 114, 182, 0.8); 
            }
            65% { 
                /* O giro de 180 para 540 graus cria a pirueta completa mostrando as costas e frente rapidamente */
                transform: rotateY(540deg) scale(1.15); 
                box-shadow: 0 0 30px rgba(244, 114, 182, 0.8); 
            }
            100% { 
                transform: rotateY(540deg) scale(0.9); 
                opacity: 0.7; 
            }
        }

        .scene.matched {
            z-index: 10; /* Garante que a carta do par fique por cima ao pular */
        }

        .scene.matched .card-inner {
            animation: match-anim 1.2s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        .scene.matched .card-front {
            border: 3px solid #dcc3f5;
        }

        .card-front, .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            -webkit-backface-visibility: hidden;
            backface-visibility: hidden;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .card-front {
            transform: rotateY(180deg);
            background-color: #1a1a1a;
            border: 2px solid rgba(255,255,255,0.1);
            transition: border-color 0.3s;
        }

        .card-back {
            background: linear-gradient(135deg, #a874e4, #cba4f1);
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid #dcc3f5;
            box-shadow: inset 0 0 20px rgba(255,255,255,0.3), 0 4px 10px rgba(168, 85, 247, 0.4);
            transition: filter 0.3s;
        }

        .scene:hover .card-back {
            filter: brightness(1.1);
        }

        .card-front img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            pointer-events: none;
        }

        #winModal {
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            backdrop-filter: blur(10px);
        }
        #winModal.active {
            opacity: 1;
            pointer-events: auto;
        }
        .modal-content {
            transform: scale(0.8);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        #winModal.active .modal-content {
            transform: scale(1);
        }
    </style>
</head>
<body class="text-white relative h-[100dvh] flex flex-col">

    <!-- Fundo de estrelas removido -->
    <div class="fixed inset-0 pointer-events-none z-0 overflow-hidden">
        <div class="ambient-light-1 absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[90vw] h-[90vw] max-w-[800px] max-h-[800px] bg-purple-900/20 blur-[120px] rounded-full"></div>
        <div class="ambient-light-2 absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[60vw] h-[60vw] max-w-[500px] max-h-[500px] bg-pink-600/10 blur-[100px] rounded-full"></div>
    </div>

    <!-- Cabeçalho (shrink-0 para não amassar) -->
    <div class="relative z-20 w-full p-4 md:px-6 md:py-5 flex justify-between items-center max-w-4xl mx-auto shrink-0">
        <div>
            <h1 class="text-xl md:text-3xl font-black tracking-tight text-white leading-none">
                Jogo da Memória
            </h1>
            <p class="text-[10px] md:text-sm text-[#dcc3f5] font-medium mt-1">Encontre os pares de suas fotos especiais.</p>
        </div>
        
        <div class="bg-white/10 backdrop-blur-md px-3 py-1.5 md:px-4 md:py-2 rounded-xl md:rounded-2xl border border-white/10 flex flex-col items-center shadow-lg">
            <span class="text-[8px] md:text-[9px] uppercase tracking-widest text-[#dcc3f5] font-bold">Movimentos</span>
            <span id="movesCounter" class="text-lg md:text-xl font-black text-white leading-none mt-0.5">0</span>
        </div>
    </div>

    <!-- Grid Flexível (flex-grow para ocupar o restante da tela sem scroll) -->
    <div class="relative z-20 flex-grow flex items-center justify-center p-3 md:p-6 min-h-0 w-full">
        <div id="gameGrid" class="grid grid-cols-3 grid-rows-4 md:grid-cols-4 md:grid-rows-3 gap-2 md:gap-4 w-full h-full max-w-3xl mx-auto">
            <!-- Cartas serão geradas via JS e preencherão a altura inteira do grid automaticamente -->
        </div>
    </div>

    <!-- Rodapé (shrink-0) -->
    <div class="relative z-20 w-full flex justify-center pb-4 pt-1 shrink-0">
        <a href="jogos.html" class="text-[10px] md:text-[11px] font-semibold text-[#b4b4c4] bg-black/40 px-4 py-1.5 rounded-full backdrop-blur-md border border-white/10 hover:text-white transition-colors">
            Criado com <span class="text-[#a874e4] font-bold">Lontra</span>
        </a>
    </div>

    <div id="winModal" class="fixed inset-0 z-50 flex items-center justify-center bg-black/80 px-4">
        <div class="modal-content w-full max-w-sm bg-white border-2 border-[#dcc3f5] rounded-[32px] shadow-[0_8px_0_0_#dcc3f5] p-6 md:p-8 flex flex-col items-center text-center relative overflow-hidden">
            
            <div class="absolute top-0 left-0 w-full h-full pointer-events-none opacity-50 flex justify-around">
                <div class="w-2 h-2 rounded-full bg-pink-400 absolute top-4 left-8 animate-bounce"></div>
                <div class="w-3 h-3 rounded-full bg-purple-400 absolute top-12 right-12 animate-pulse"></div>
                <div class="w-2 h-2 rounded-full bg-yellow-400 absolute bottom-16 left-12 animate-ping"></div>
            </div>

            <div class="w-20 h-20 bg-[#f8f5ff] rounded-full flex items-center justify-center text-4xl mb-4 shadow-inner border-2 border-[#dcc3f5]">
                🎉
            </div>
            
            <h2 class="text-[#4a4a5f] font-black text-2xl leading-tight mb-2">Parabéns!</h2>
            <p class="text-[#8a8a9e] font-medium text-sm mb-6">Você encontrou todos os momentos especiais em <span id="finalMoves" class="font-black text-[#a874e4]">0</span> movimentos.</p>
            
            <button onclick="restartGame()" class="w-full bg-[#a874e4] text-white font-bold text-[15px] py-4 rounded-[20px] shadow-[0_4px_0_0_#8b5bc4] hover:bg-[#9760d6] active:translate-y-[4px] active:shadow-none transition-all flex items-center justify-center gap-2">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path><path d="M3 3v5h5"></path></svg>
                Jogar Novamente
            </button>
        </div>
    </div>

    <script>
        const images = [
            "https://storage.googleapis.com/amore-pages1-62585403-acd4b.firebasestorage.app/lovepages/FmpSee8q4pO4mEzmXo45/memory-game/1776001260049-w76qem-download__39_.jfif",
            "https://storage.googleapis.com/amore-pages1-62585403-acd4b.firebasestorage.app/lovepages/FmpSee8q4pO4mEzmXo45/memory-game/1776001260064-vl8c5o-download__37_.jfif",
            "https://storage.googleapis.com/amore-pages1-62585403-acd4b.firebasestorage.app/lovepages/FmpSee8q4pO4mEzmXo45/memory-game/1776001260073-dmdoyx-download__36_.jfif",
            "https://storage.googleapis.com/amore-pages1-62585403-acd4b.firebasestorage.app/lovepages/FmpSee8q4pO4mEzmXo45/memory-game/1776001260079-8zk5h6-download__34_.jfif",
            "https://storage.googleapis.com/amore-pages1-62585403-acd4b.firebasestorage.app/lovepages/FmpSee8q4pO4mEzmXo45/memory-game/1776001260094-cygc0e-download__33_.jfif",
            "https://storage.googleapis.com/amore-pages1-62585403-acd4b.firebasestorage.app/lovepages/FmpSee8q4pO4mEzmXo45/memory-game/1776001260109-hkq40k-download__32_.jfif"
        ];

        let cards = [];
        let hasFlippedCard = false;
        let lockBoard = false;
        let firstCard, secondCard;
        let moves = 0;
        let matchedPairs = 0;

        const grid = document.getElementById('gameGrid');
        const movesCounter = document.getElementById('movesCounter');
        const winModal = document.getElementById('winModal');
        const finalMoves = document.getElementById('finalMoves');

        function initGame() {
            cards = [...images, ...images];
            cards.sort(() => Math.random() - 0.5);

            grid.innerHTML = '';
            moves = 0;
            matchedPairs = 0;
            movesCounter.innerText = moves;
            winModal.classList.remove('active');
            
            // Bloqueia a mesa para o jogador não clicar enquanto estão sendo mostradas
            lockBoard = true;

            cards.forEach((imgUrl, index) => {
                const fallbackImg = `https://picsum.photos/seed/${index+800}/300/300`;
                
                const scene = document.createElement('div');
                // Cartas são criadas com a classe 'flipped' para iniciar reveladas
                scene.className = 'scene w-full h-full flipped';
                scene.dataset.img = imgUrl;

                scene.innerHTML = `
                    <div class="card-inner">
                        <div class="card-back">
                            <svg width="32" height="32" viewBox="0 0 24 24" fill="white" stroke="white" stroke-width="2" class="opacity-80">
                                <path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"></path>
                            </svg>
                        </div>
                        <div class="card-front">
                            <img src="${imgUrl}" onerror="this.src='${fallbackImg}'" alt="Foto">
                        </div>
                    </div>
                `;

                scene.addEventListener('click', flipCard);
                grid.appendChild(scene);
            });

            // Lógica do Reveal: espera 2.5 segundos e desvira uma a uma (cascata)
            setTimeout(() => {
                const allCards = document.querySelectorAll('.scene');
                allCards.forEach((card, idx) => {
                    setTimeout(() => {
                        card.classList.remove('flipped');
                    }, idx * 80); // Efeito cascatinha (embaralhando pra baixo) a cada 80ms
                });

                // Libera o tabuleiro assim que a última carta for escondida
                setTimeout(() => {
                    lockBoard = false;
                }, (cards.length * 80) + 600); // 600ms = tempo da transição css
            }, 2500);
        }

        function flipCard() {
            if (lockBoard) return;
            if (this === firstCard) return;

            this.classList.add('flipped');

            if (!hasFlippedCard) {
                hasFlippedCard = true;
                firstCard = this;
                return;
            }

            secondCard = this;
            moves++;
            movesCounter.innerText = moves;
            checkForMatch();
        }

        function checkForMatch() {
            let isMatch = firstCard.dataset.img === secondCard.dataset.img;

            if (isMatch) {
                disableCards();
            } else {
                unflipCards();
            }
        }

        function disableCards() {
            firstCard.removeEventListener('click', flipCard);
            secondCard.removeEventListener('click', flipCard);
            
            firstCard.classList.add('matched');
            secondCard.classList.add('matched');

            matchedPairs++;
            
            if (matchedPairs === images.length) {
                // Delay estendido para poder apreciar o show da pirueta das últimas duas cartas
                setTimeout(showWinModal, 1500);
            }

            resetBoard();
        }

        function unflipCards() {
            lockBoard = true;
            setTimeout(() => {
                firstCard.classList.remove('flipped');
                secondCard.classList.remove('flipped');
                resetBoard();
            }, 1000);
        }

        function resetBoard() {
            [hasFlippedCard, lockBoard] = [false, false];
            [firstCard, secondCard] = [null, null];
        }

        function showWinModal() {
            finalMoves.innerText = moves;
            winModal.classList.add('active');
        }

        function restartGame() {
            winModal.classList.remove('active');
            setTimeout(initGame, 300);
        }

        window.onload = function() {
            initGame();
        };
    </script>
</body>
</html>
